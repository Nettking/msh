services:
  # Interactive one-shot analysis container (CLI runner), not a persistent service.
  # Intended workflow:
  #   1) Build image: docker compose build msh
  #   2) Run runner: docker compose run --rm msh
  # `docker compose up` / `docker compose up --build` is not the intended entrypoint for normal use.
  msh:
    build: .
    stdin_open: true
    tty: true
    volumes:
      - ./data:/app/data
      - ./results:/app/results
