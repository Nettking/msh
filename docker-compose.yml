services:
  # Optional one-shot orchestration run (prep only).
  prep:
    build:
      context: .
      dockerfile: Dockerfile.cli
    environment:
      - MSH_SCAN_DIRS=results,data
    volumes:
      - ./data:/app/data
      - ./results:/app/results

  # Primary always-on digital twin workspace (auto-prepare + Flask).
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - MSH_SCAN_DIRS=results,data
    volumes:
      - ./results:/app/results
      - ./data:/app/data
