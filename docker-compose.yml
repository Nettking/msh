services:
  # Secondary interactive one-shot analysis container (CLI runner), not a persistent service.
  msh:
    build:
      context: .
      dockerfile: Dockerfile.cli
    stdin_open: true
    tty: true
    volumes:
      - ./data:/app/data
      - ./results:/app/results

  # Primary always-on digital twin workspace (Flask).
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - MSH_SCAN_DIRS=results,data
    volumes:
      - ./results:/app/results
      - ./data:/app/data
