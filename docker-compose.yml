services:
  # Secondary interactive one-shot analysis container (CLI runner), not a persistent service.
  # Intended workflow:
  #   1) Build image: docker compose build msh
  #   2) Run runner: docker compose run --rm msh
  # `docker compose up` / `docker compose up --build` is not the intended entrypoint for normal use.
  msh:
    build:
      context: .
      dockerfile: Dockerfile.cli
    stdin_open: true
    tty: true
    volumes:
      - ./data:/app/data
      - ./results:/app/results

  # Primary always-on digital twin workspace.
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    volumes:
      - ./results:/app/results
      - ./data:/app/data
