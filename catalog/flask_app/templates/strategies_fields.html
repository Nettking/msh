<label class="checkbox-row"><input type="checkbox" name="{{ prefix }}enabled" value="1" {% if strategy.enabled %}checked{% endif %}> Enabled</label>

<label for="{{ prefix }}id">ID</label>
<input id="{{ prefix }}id" name="{{ prefix }}id" type="text" value="{{ strategy.id or '' }}" placeholder="override_drop">

<label for="{{ prefix }}type">Type</label>
<select id="{{ prefix }}type" name="{{ prefix }}type">
  {% for strategy_type in page.supported_types %}
  <option value="{{ strategy_type }}" {% if strategy.type == strategy_type %}selected{% endif %}>{{ strategy_type }}</option>
  {% endfor %}
</select>

<label for="{{ prefix }}suggested_label">Suggested label</label>
<select id="{{ prefix }}suggested_label" name="{{ prefix }}suggested_label">
  <option value="">Choose label…</option>
  {% for label_id in page.labels.keys() %}
  <option value="{{ label_id }}" {% if strategy.suggested_label == label_id %}selected{% endif %}>{{ label_id }}</option>
  {% endfor %}
</select>

<label for="{{ prefix }}signal">Signal</label>
<input id="{{ prefix }}signal" name="{{ prefix }}signal" type="text" value="{{ strategy.signal or '' }}" placeholder="Sovr">

<label for="{{ prefix }}companion_signal">Companion signal <span class="field-hint">ratio_drop only</span></label>
<input id="{{ prefix }}companion_signal" name="{{ prefix }}companion_signal" type="text" value="{{ strategy.companion_signal or '' }}" placeholder="Srpm">

<label for="{{ prefix }}threshold">Threshold <span class="field-hint">delta_threshold only</span></label>
<input id="{{ prefix }}threshold" name="{{ prefix }}threshold" type="number" step="any" value="{{ strategy.threshold if strategy.threshold is defined else '' }}" placeholder="-10">

<label for="{{ prefix }}ratio_threshold">Ratio threshold <span class="field-hint">ratio_drop only, 0..1</span></label>
<input id="{{ prefix }}ratio_threshold" name="{{ prefix }}ratio_threshold" type="number" min="0" max="1" step="any" value="{{ strategy.ratio_threshold if strategy.ratio_threshold is defined else '' }}" placeholder="0.5">

<label for="{{ prefix }}window_seconds">Window seconds</label>
<input id="{{ prefix }}window_seconds" name="{{ prefix }}window_seconds" type="number" min="0" step="any" value="{{ strategy.window_seconds if strategy.window_seconds is defined else '' }}" placeholder="30">

<label for="{{ prefix }}description">Description</label>
<textarea id="{{ prefix }}description" name="{{ prefix }}description" rows="3" placeholder="Short operator-facing description">{{ strategy.description or '' }}</textarea>
